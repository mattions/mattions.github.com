---
layout: default
title: Archive
---
<div class="container">
  <section class="list-header">
    <h1>Archive</h1>
  </section>

  <ul class="archive-list">
    {% for post in site.posts %}
    <li class="archive-item">
      <time>{{ post.date | date: "%B %Y" }}</time>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </li>
    {% endfor %}
  </ul>
</div>
