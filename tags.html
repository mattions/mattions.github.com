---
layout: default
title: Tags
---
<div class="container">
  <section class="list-header">
    <h1>Tags</h1>
  </section>

  <ul class="tag-list">
    {% assign tags_list = site.tags %}
    {% if tags_list.first[0] == null %}
      <li>No tags.</li>
    {% else %}
      {% for tag in tags_list %}
      <li><a href="{{ tag[0] | slugify | prepend: '/tags/' | relative_url }}">{{ tag[0] }}</a></li>
      {% endfor %}
    {% endif %}
    {% assign tags_list = nil %}
  </ul>
</div>
