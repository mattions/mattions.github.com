# Jekyll configuration for GitHub Pages
title: Michele Mattioni
description: Computational Neuroscience · Open Source · Sustainable Tech
baseurl: ""
url: "https://michelemattioni.me"

# Build settings
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Permalinks
permalink: /projects/:year/:month/:day/:title/

# Author
author:
  name: Michele Mattioni
  email: mattions@gmail.com
  github: mattions
  twitter: mattions

# Navigation
nav:
  - title: Home
    url: /
  - title: Projects
    url: /projects/
  - title: About
    url: /about/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: project
      author: Michele Mattioni

# Exclude non-essential files
exclude:
  - README.md
  - changelog.md
  - node_modules/
  - Gemfile
  - Gemfile.lock
